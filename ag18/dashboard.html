<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aguerta 18 — Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
tailwind.config={theme:{extend:{colors:{bone:'#F5F0E8',cream:'#E8DFD0',gold:'#C9A96E',darkgold:'#8B7355',surface:'#111111',panel:'#1A1A1A',border:'#2A2A2A'}}}}
</script>
  <style>
html,body{height:100%;margin:0;overflow:hidden}
*{scrollbar-width:thin;scrollbar-color:#2A2A2A #111111}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111111}
::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .5s ease both}
.slide-in{animation:slideIn .4s ease both}
.card-hover{transition:all .3s ease}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(201,169,110,.1)}
.tag-pill{transition:all .2s ease}
.tag-pill:hover{transform:scale(1.05)}
.nav-link{position:relative;transition:color .2s}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:#C9A96E;transition:width .3s}
.nav-link:hover::after,.nav-link.active::after{width:100%}
.glass{background:rgba(17,17,17,.85);backdrop-filter:blur(12px)}
input,textarea,select{background:#111!important;border:1px solid #2A2A2A!important;color:#F5F0E8!important;outline:none!important}
input:focus,textarea:focus,select:focus{border-color:#C9A96E!important}
.toast{animation:fadeUp .3s ease both}
.modal-overlay{background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#content{position:relative}
#content::before{content:'';position:absolute;inset:0;background:url('https://i.postimg.cc/SxPXrddz/aguerta18.png') no-repeat center center / 38% auto;opacity:.06;pointer-events:none;z-index:-1}
  </style>
</head>
<body class="h-full bg-black text-bone font-['Outfit',sans-serif]">
  <!-- Loading -->
  <div id="loading" class="h-full w-full flex items-center justify-center" style="background:radial-gradient(ellipse at 50% 0%,#0d0b08 0%,#000 60%)">
    <div class="text-center fade-up">
      <img src="https://i.postimg.cc/SxPXrddz/aguerta18.png" alt="Aguerta 18" class="w-16 h-16 mx-auto mb-4 object-contain animate-pulse">
      <p class="text-cream/40 text-xs tracking-widest uppercase">Chargement...</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden h-full w-full flex flex-col overflow-hidden">
    <!-- Navbar -->
    <nav class="glass border-b border-border px-4 py-0 flex-shrink-0 z-40">
      <div class="max-w-7xl mx-auto flex items-center justify-between h-14">
        <div class="flex items-center gap-3">
          <img src="https://i.postimg.cc/SxPXrddz/aguerta18.png" alt="Aguerta 18" class="w-8 h-8 object-contain">
          <span id="navTitle" class="text-sm font-semibold text-bone tracking-wide hidden sm:block">AGUERTA 18</span>
        </div>
        <div class="hidden md:flex items-center gap-1">
          <button onclick="navigate('accueil')" data-nav="accueil" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Accueil</button>
          <button onclick="navigate('police')" data-nav="police" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Police</button>
          <button onclick="navigate('gang')" data-nav="gang" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Gang</button>
          <button onclick="navigate('entreprise')" data-nav="entreprise" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Entreprise</button>
          <button onclick="navigate('civils')" data-nav="civils" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Civils</button>
          <button onclick="navigate('annonces')" data-nav="annonces" class="nav-link px-3 py-4 text-xs tracking-wider uppercase text-cream/60 hover:text-bone">Annonces</button>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="navigate('profil')" class="flex items-center gap-2 px-3 py-1.5 rounded border border-border hover:border-gold/30 transition-all">
            <img id="navAvatar" src="" alt="" class="w-5 h-5 rounded-full hidden object-cover">
            <i id="navAvatarIcon" data-lucide="user" class="w-3.5 h-3.5 text-gold"></i>
            <span id="navUser" class="text-xs text-cream/60 hidden sm:block">User</span>
          </button>
          <button id="mobileMenuBtn" onclick="toggleMobile()" class="md:hidden p-2 text-cream/60 hover:text-bone">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </nav>
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden glass border-b border-border px-4 py-3 flex-shrink-0 z-30">
      <div class="grid grid-cols-3 gap-2">
        <button onclick="navigate('accueil');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Accueil</button>
        <button onclick="navigate('police');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Police</button>
        <button onclick="navigate('gang');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Gang</button>
        <button onclick="navigate('entreprise');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Entreprise</button>
        <button onclick="navigate('civils');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Civils</button>
        <button onclick="navigate('annonces');toggleMobile()" class="text-xs text-cream/60 hover:text-bone py-2 text-center rounded bg-surface">Annonces</button>
      </div>
    </div>
    <!-- Content -->
    <div id="content" class="flex-1 overflow-auto" style="background:radial-gradient(ellipse at 50% 0%,#0d0b08 0%,#000 60%)">
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-4 right-4 z-50 px-4 py-3 rounded border text-sm toast"></div>

<script>
// ===== CONFIGURATION SUPABASE =====
const SUPABASE_URL = 'https://lcwtiaohaedeuelzbvfk.supabase.co';
const SUPABASE_ANON_KEY = 'lcwtiaohaedeuelzbvfk'; // ← Remplace par ta clé anon (Settings > API)
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// State
let currentUser = null;
let currentPage = 'accueil';
let allRecords = [];
let searchQuery = '';

const ROLES_HIERARCHY = ['Admin','Patron','Co patron','Bras droit','Lieutenant','Élite','Soldat','En attente'];
const TAGS = ['BCSO','LSPD','Gang','Entreprise','Civils'];
const TAG_COLORS = {BCSO:'#3B82F6',LSPD:'#6366F1',Gang:'#EF4444',Entreprise:'#F59E0B',Civils:'#10B981'};

const PERMS = {
  'Admin':{read:true,create:true,edit:true,delete:true,announce:true,manage:true},
  'Patron':{read:true,create:true,edit:true,delete:true,announce:true,manage:false},
  'Co patron':{read:true,create:true,edit:true,delete:true,announce:true,manage:false},
  'Co-patron':{read:true,create:true,edit:true,delete:true,announce:true,manage:false},
  'Bras droit':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'Lieutenant':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'Élite':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'Elite':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'Soldat':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'En attente':{read:false,create:false,edit:false,delete:false,announce:false,manage:false},
};

function can(action){return currentUser&&PERMS[currentUser.role]?.[action]}

// ===== NETTOYAGE URL (supprime le token de la barre d'adresse) =====
function cleanUrl(){
  if(window.location.hash && window.location.hash.includes('access_token')){
    history.replaceState(null, '', window.location.pathname);
  }
}

// ===== SUPABASE DATA =====
async function loadRecords(){
  const {data, error} = await sb.from('records').select('*').order('created_at',{ascending:true});
  if(error){showToast('Erreur de chargement des données','error');return}
  allRecords = data || [];
  renderCurrentPage();
}

// ===== AUTH =====
async function initDashboard(profile, session){
  const meta = session?.user?.user_metadata || {};
  const avatarUrl = meta.avatar_url || '';
  const discordName = meta.full_name || meta.custom_claims?.global_name || meta.name || profile.username;

  currentUser = {
    id: profile.id,
    name: profile.username,
    role: profile.role || 'En attente',
    email: profile.email,
    username: profile.username,
    avatar_url: avatarUrl,
    discord_name: discordName,
  };

  // Hide loading, show app
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('flex');

  // Navbar: avatar + nom
  const navUserEl = document.getElementById('navUser');
  navUserEl.textContent = currentUser.discord_name || currentUser.name;
  const navAvatarEl = document.getElementById('navAvatar');
  if(navAvatarEl && avatarUrl){
    navAvatarEl.src = avatarUrl;
    navAvatarEl.classList.remove('hidden');
    const navAvatarIcon = document.getElementById('navAvatarIcon');
    if(navAvatarIcon) navAvatarIcon.classList.add('hidden');
  }

  if(can('read')){
    await loadRecords();
    navigate('accueil');
  } else {
    allRecords = [];
    navigate('profil');
  }
  lucide.createIcons();
}

async function bootstrapAuth(){
  const {data: {session}} = await sb.auth.getSession();

  // Nettoyer le token de l'URL (après que Supabase l'ait lu)
  cleanUrl();

  if(!session){
    // Pas de session → retour au login
    window.location.href = 'index.html';
    return;
  }

  let {data: profile} = await sb.from('profiles').select('*').eq('id', session.user.id).single();

  // Auto-créer le profil pour les connexions OAuth (Discord)
  if(!profile && session.user){
    const meta = session.user.user_metadata || {};
    const username = meta.full_name || meta.name || meta.preferred_username || session.user.email?.split('@')[0] || 'Utilisateur';
    const email = session.user.email || '';
    const {data: newProfile, error: insertErr} = await sb.from('profiles').insert({
      id: session.user.id,
      username: username,
      email: email,
      role: 'En attente'
    }).select().single();
    if(!insertErr && newProfile) profile = newProfile;
  }

  if(profile){
    await initDashboard(profile, session);
  } else {
    window.location.href = 'index.html';
  }
}

bootstrapAuth();

// Listen for auth state changes
sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'SIGNED_OUT'){
    window.location.href = 'index.html';
  }
});

// Navigation
function navigate(page){
  currentPage = page;
  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.classList.toggle('active', b.dataset.nav === page);
    b.classList.toggle('text-bone', b.dataset.nav === page);
  });
  renderCurrentPage();
}
function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('hidden')}

// Render
function applySearch(items){
  if(!searchQuery) return items;
  const q = searchQuery.toLowerCase();
  return items.filter(f=>
    (f.nom||'').toLowerCase().includes(q)||
    (f.prenom||'').toLowerCase().includes(q)||
    (f.telephone||'').includes(q)||
    (f.description||'').toLowerCase().includes(q)||
    (f.tags||'').toLowerCase().includes(q)||
    (f.title||'').toLowerCase().includes(q)||
    (f.content||'').toLowerCase().includes(q)
  );
}

function renderCurrentPage(){
  const c = document.getElementById('content');
  if(!c) return;
  const fiches = allRecords.filter(r => !r.is_announcement);
  const annonces = allRecords.filter(r => r.is_announcement);
  switch(currentPage){
    case'accueil':renderAccueil(c,fiches,annonces);break;
    case'police':renderCategory(c,'Police',applySearch(fiches.filter(f=>(f.tags||'').includes('BCSO')||(f.tags||'').includes('LSPD'))));break;
    case'gang':renderCategory(c,'Gang',applySearch(fiches.filter(f=>(f.tags||'').includes('Gang'))));break;
    case'entreprise':renderCategory(c,'Entreprise',applySearch(fiches.filter(f=>(f.tags||'').includes('Entreprise'))));break;
    case'civils':renderCategory(c,'Civils',applySearch(fiches.filter(f=>(f.tags||'').includes('Civils'))));break;
    case'annonces':renderAnnonces(c,applySearch(annonces));break;
    case'profil':renderProfil(c);break;
    case'fiche-new':renderFicheForm(c);break;
    case'fiche-detail':renderFicheDetail(c);break;
    default:renderAccueil(c,fiches,annonces);
  }
  lucide.createIcons();
}

function renderAccueil(c,fiches,annonces){
  const recent = fiches.slice(-6).reverse();
  const recentAnn = annonces.slice(-3).reverse();
  c.innerHTML=`
  <div class="max-w-6xl mx-auto p-4 sm:p-6 space-y-10">
    <div class="text-center py-12 fade-up">
      <img src="https://i.postimg.cc/SxPXrddz/aguerta18.png" alt="Aguerta 18" class="w-20 h-20 mx-auto mb-4 object-contain">
      <h1 class="text-3xl sm:text-4xl font-['Cormorant_Garamond'] font-bold text-bone mb-2">Aguerta 18</h1>
      <p class="text-cream/40 text-sm tracking-widest uppercase">Base de données — ${fiches.length} fiches</p>
      <div class="mt-6 max-w-md mx-auto relative">
        <input type="text" placeholder="Rechercher une fiche..." value="${searchQuery}" oninput="handleSearch(this.value)" class="w-full px-4 py-2.5 pl-10 rounded text-sm">
        <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-cream/30"></i>
      </div>
    </div>
    ${searchQuery?renderSearchResults(fiches):`
    ${recentAnn.length?`
    <section class="fade-up" style="animation-delay:.1s">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-bone flex items-center gap-2"><i data-lucide="megaphone" class="w-4 h-4 text-gold"></i>Annonces récentes</h2>
        <button onclick="navigate('annonces')" class="text-xs text-gold hover:text-gold/70 transition-colors">Voir tout →</button>
      </div>
      <div class="space-y-2">${recentAnn.map(a=>`
        <div class="bg-panel border border-border rounded p-4">
          <div class="flex items-start justify-between">
            <div><h3 class="text-sm font-medium text-bone">${esc(a.title||'')}</h3><p class="text-xs text-cream/40 mt-1">${esc(a.content||'').substring(0,120)}${(a.content||'').length>120?'...':''}</p></div>
            <span class="text-[10px] text-cream/30 whitespace-nowrap ml-4">${formatDate(a.created_at)}</span>
          </div>
        </div>`).join('')}
      </div>
    </section>`:''}
    <section class="fade-up" style="animation-delay:.2s">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-bone flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-gold"></i>Fiches récentes</h2>
        ${can('create')?`<button onclick="currentPage='fiche-new';renderCurrentPage()" class="text-xs px-3 py-1.5 bg-gold/10 border border-gold/30 text-gold rounded hover:bg-gold/20 transition-all flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i>Nouvelle fiche</button>`:''}
      </div>
      ${recent.length?`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${recent.map(f=>ficheCard(f)).join('')}</div>`
      :`<div class="text-center py-16 text-cream/30"><i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3 opacity-50"></i><p class="text-sm">Aucune fiche pour le moment</p></div>`}
    </section>
    <section class="fade-up grid grid-cols-2 sm:grid-cols-5 gap-3" style="animation-delay:.3s">
      ${TAGS.map(t=>{
        const count=fiches.filter(f=>(f.tags||'').includes(t)).length;
        return`<div class="bg-panel border border-border rounded p-3 text-center">
          <div class="w-2 h-2 rounded-full mx-auto mb-2" style="background:${TAG_COLORS[t]}"></div>
          <div class="text-lg font-semibold text-bone">${count}</div>
          <div class="text-[10px] text-cream/40 uppercase tracking-wider">${t}</div>
        </div>`;
      }).join('')}
    </section>
    `}
  </div>`;
}

function renderSearchResults(fiches){
  const q = searchQuery.toLowerCase();
  const results = fiches.filter(f=>
    (f.nom||'').toLowerCase().includes(q)||
    (f.prenom||'').toLowerCase().includes(q)||
    (f.telephone||'').includes(q)||
    (f.tags||'').toLowerCase().includes(q)
  );
  return`<section>
    <p class="text-xs text-cream/40 mb-4">${results.length} résultat(s) pour "${esc(searchQuery)}"</p>
    ${results.length?`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${results.map(f=>ficheCard(f)).join('')}</div>`
    :`<div class="text-center py-8 text-cream/30 text-sm">Aucun résultat</div>`}
  </section>`;
}

function handleSearch(v){
  searchQuery = v;
  renderCurrentPage();
  const input = document.querySelector('input[placeholder="Rechercher une fiche..."]');
  if(input) setTimeout(()=>input.focus(),0);
}

function ficheCard(f){
  const tags = (f.tags||'').split(',').filter(Boolean);
  const initials = ((f.prenom||'')[0]||'')+((f.nom||'')[0]||'');
  return`<div class="card-hover bg-panel border border-border rounded-lg overflow-hidden cursor-pointer" onclick="viewFiche('${f.id}')">
    <div class="h-32 bg-surface flex items-center justify-center" style="background:linear-gradient(135deg,${TAG_COLORS[tags[0]]||'#333'}22,#111)">
      <div class="w-14 h-14 rounded-full bg-black/40 border border-border flex items-center justify-center text-lg font-semibold text-bone/70">${esc(initials.toUpperCase())}</div>
    </div>
    <div class="p-4">
      <h3 class="text-sm font-semibold text-bone">${esc(f.prenom||'')} ${esc(f.nom||'')}</h3>
      <p class="text-[11px] text-cream/40 mt-1 line-clamp-2">${esc((f.description||'').substring(0,80))}</p>
      <div class="flex flex-wrap gap-1 mt-3">${tags.map(t=>`<span class="tag-pill text-[9px] px-2 py-0.5 rounded-full font-medium" style="background:${TAG_COLORS[t]||'#555'}22;color:${TAG_COLORS[t]||'#999'}">${esc(t)}</span>`).join('')}</div>
      <div class="text-[10px] text-cream/20 mt-3">${formatDate(f.created_at)}</div>
    </div>
  </div>`;
}

let selectedFicheId = null;
function viewFiche(id){selectedFicheId=id;currentPage='fiche-detail';renderCurrentPage()}

function renderFicheDetail(c){
  const f = allRecords.find(r => r.id === selectedFicheId);
  if(!f){c.innerHTML=`<div class="p-8 text-center text-cream/40">Fiche introuvable</div>`;return}
  const tags = (f.tags||'').split(',').filter(Boolean);
  const initials = ((f.prenom||'')[0]||'')+((f.nom||'')[0]||'');
  c.innerHTML=`
  <div class="max-w-3xl mx-auto p-4 sm:p-6 fade-up">
    <button onclick="navigate(currentPage==='fiche-detail'?'accueil':currentPage)" class="text-xs text-cream/40 hover:text-cream/60 flex items-center gap-1 mb-6 transition-colors"><i data-lucide="arrow-left" class="w-3 h-3"></i>Retour</button>
    <div class="bg-panel border border-border rounded-lg overflow-hidden">
      <div class="h-40 flex items-center justify-center" style="background:linear-gradient(135deg,${TAG_COLORS[tags[0]]||'#333'}33,#111)">
        <div class="w-20 h-20 rounded-full bg-black/50 border-2 border-border flex items-center justify-center text-2xl font-bold text-bone/60">${esc(initials.toUpperCase())}</div>
      </div>
      <div class="p-6 space-y-4">
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-xl font-['Cormorant_Garamond'] font-bold text-bone">${esc(f.prenom||'')} ${esc(f.nom||'')}</h1>
            <div class="flex flex-wrap gap-1 mt-2">${tags.map(t=>`<span class="tag-pill text-[10px] px-2 py-0.5 rounded-full font-medium" style="background:${TAG_COLORS[t]||'#555'}22;color:${TAG_COLORS[t]||'#999'}">${esc(t)}</span>`).join('')}</div>
          </div>
          <div class="flex gap-2">
            ${can('edit')?`<button onclick="editFiche('${f.id}')" class="p-2 bg-surface border border-border rounded hover:border-gold/30 transition-all"><i data-lucide="edit" class="w-3.5 h-3.5 text-cream/50"></i></button>`:''}
            ${can('delete')?`<button onclick="confirmDeleteFiche('${f.id}')" class="p-2 bg-surface border border-border rounded hover:border-red-500/30 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-400/50"></i></button>`:''}
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 border-t border-border">
          <div><span class="text-[10px] text-cream/30 uppercase tracking-wider">Téléphone</span><p class="text-sm text-bone mt-1">${esc(f.telephone||'N/A')}</p></div>
          <div><span class="text-[10px] text-cream/30 uppercase tracking-wider">Créé par</span><p class="text-sm text-bone mt-1">${esc(f.created_by||'Inconnu')}</p></div>
          <div><span class="text-[10px] text-cream/30 uppercase tracking-wider">Date</span><p class="text-sm text-bone mt-1">${formatDate(f.created_at)}</p></div>
        </div>
        ${f.description?`<div class="pt-4 border-t border-border"><span class="text-[10px] text-cream/30 uppercase tracking-wider">Description</span><p class="text-sm text-cream/70 mt-2 leading-relaxed">${esc(f.description)}</p></div>`:''}

            <button onclick="doDeleteFiche('${f.id}')" class="px-4 py-2 bg-red-500/20 border border-red-500/40 text-red-400 text-xs rounded hover:bg-red-500/30 transition-all">Confirmer</button>

function confirmDeleteFiche(id){
  const el = document.getElementById('deleteConfirm-'+id);
  if(el) el.classList.remove('hidden');
}

async function doDeleteFiche(id){
  const {error} = await sb.from('records').delete().eq('id', id);
  if(error){showToast('Erreur de suppression','error');return}
  showToast('Fiche supprimée');
  await loadRecords();
  navigate('accueil');
}

        <div><label for="ff-tel" class="text-[10px] text-cream/40 uppercase tracking-wider mb-1 block">Téléphone</label><input id="ff-tel" name="telephone" value="${esc(existing?.telephone||'')}" class="w-full px-3 py-2 rounded text-sm"></div>
        <div><label for="ff-desc" class="text-[10px] text-cream/40 uppercase tracking-wider mb-1 block">Description</label><textarea id="ff-desc" name="description" rows="4" class="w-full px-3 py-2 rounded text-sm resize-none">${esc(existing?.description||'')}</textarea></div>
        <div>
          <label class="text-[10px] text-cream/40 uppercase tracking-wider mb-2 block">Tags</label>
          <div class="flex flex-wrap gap-2" id="tagSelector">
            ${TAGS.map(t=>`<button type="button" onclick="toggleTag(this,'${t}')" class="tag-pill text-xs px-3 py-1 rounded-full border transition-all ${selectedTags.includes(t)?'border-gold/50 text-gold bg-gold/10':'border-border text-cream/40 hover:border-cream/30'}" data-tag="${t}" data-selected="${selectedTags.includes(t)}">${t}</button>`).join('')}
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" id="ficheSubmitBtn" class="px-6 py-2.5 bg-gold/10 border border-gold/40 text-gold text-sm rounded hover:bg-gold/20 transition-all flex items-center gap-2">
            <i data-lucide="${isEdit?'check':'plus'}" class="w-3.5 h-3.5"></i>${isEdit?'Enregistrer':'Créer la fiche'}
          </button>
          <button type="button" onclick="editingFicheId=null;navigate('accueil')" class="px-4 py-2.5 bg-surface border border-border text-cream/50 text-sm rounded hover:border-cream/20 transition-all">Annuler</button>
        </div>
      </form>
    </div>
  </div>`;
}

function toggleTag(btn,tag){
  const sel = btn.dataset.selected==='true';
  btn.dataset.selected = sel?'false':'true';
  if(sel){btn.className='tag-pill text-xs px-3 py-1 rounded-full border transition-all border-border text-cream/40 hover:border-cream/30'}
  else{btn.className='tag-pill text-xs px-3 py-1 rounded-full border transition-all border-gold/50 text-gold bg-gold/10'}
}

async function handleFicheSubmit(e){
  e.preventDefault();
  const btn = document.getElementById('ficheSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="animate-pulse">Enregistrement...</span>';
  const fd = new FormData(e.target);
  const tags = [...document.querySelectorAll('#tagSelector [data-selected="true"]')].map(b=>b.dataset.tag).join(',');

  if(editingFicheId){
    const {error} = await sb.from('records').update({
      nom: fd.get('nom'), prenom: fd.get('prenom'),
      telephone: fd.get('telephone'), description: fd.get('description'), tags
    }).eq('id', editingFicheId);
    if(error){showToast('Erreur de modification','error');btn.disabled=false;btn.innerHTML='Réessayer';return}
    showToast('Fiche modifiée');
  } else {
    const {error} = await sb.from('records').insert({
      type: 'fiche', nom: fd.get('nom'), prenom: fd.get('prenom'),
      telephone: fd.get('telephone'), description: fd.get('description'),
      tags, is_announcement: false,
      created_by: currentUser?.name || 'Inconnu'
    });
    if(error){showToast('Erreur de création','error');btn.disabled=false;btn.innerHTML='Réessayer';return}
    showToast('Fiche créée');
  }
  editingFicheId = null;
  await loadRecords();
  navigate('accueil');
}

async function loadUsersForAdmin(){
  const area = document.getElementById('adminUsersArea');
  if(!area) return;
  area.innerHTML = 'Chargement...';

  const {data: users, error} = await sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error){area.innerHTML=`<p class="text-red-400">${esc(error.message||'Erreur')}</p>`;return}
  if(!users||!users.length){area.innerHTML='<p>Aucun utilisateur</p>';return}

  area.innerHTML = users.map(u=>`<div class="bg-surface border border-border rounded p-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
    <div>
      <p class="text-bone text-sm">${esc(u.username||'')}</p>
      <p class="text-cream/40 text-[11px]">${esc(u.email||'')}</p>
    </div>
    <div class="flex items-center gap-2">
      <select id="role-${u.id}" class="px-2 py-1 rounded text-xs">
        ${ROLES_HIERARCHY.map(role=>`<option value="${esc(role)}" ${u.role===role?'selected':''}>${esc(role)}</option>`).join('')}
      </select>
      <button onclick="changeUserRole('${u.id}')" class="px-2 py-1 bg-gold/10 border border-gold/30 text-gold rounded text-xs">Appliquer</button>
    </div>
  </div>`).join('');
}

async function changeUserRole(userId){
  const input = document.getElementById(`role-${userId}`);
  if(!input) return;
  const role = input.value;

  const {error} = await sb.from('profiles').update({role}).eq('id', userId);
  if(error){showToast(error.message||'Erreur de mise à jour','error');return}
  showToast('Rôle mis à jour');

  if(userId === currentUser.id){
    currentUser.role = role;
    document.getElementById('navUser').textContent = currentUser.discord_name || currentUser.name;
  }
  await loadUsersForAdmin();
}

async function logout(){
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// Utilities
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function formatDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}catch{return''}}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`fixed bottom-4 right-4 z-50 px-4 py-3 rounded border text-sm toast ${type==='error'?'bg-red-500/10 border-red-500/30 text-red-400':'bg-gold/10 border-gold/30 text-gold'}`;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3000);
}

lucide.createIcons();
