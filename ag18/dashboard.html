<script>
// ===== CONFIGURATION SUPABASE =====
const SUPABASE_URL = 'https://lcwtiaohaedeuelzbvfk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kSfXQZvC7hlPDgLTc80r7g_Pfwi9WcT';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storage: window.sessionStorage,
  },
});

// State
let currentUser = null;
let currentPage = 'accueil';
let allRecords = [];
let allGroups = [];
let searchQuery = '';
let profileOnlyMode = false;
let selectedGroupId = null;
const MEDIA_MAX_SIZE_MB = 20;
const MEDIA_MAX_SIZE_BYTES = MEDIA_MAX_SIZE_MB * 1024 * 1024;

const ROLES_HIERARCHY = ['Admin','Patron','Co patron','Bras droit','Lieutenant','Élite','Soldat','En attente'];
const BASE_TAGS = ['BCSO','LSPD','Gang','Entreprise','Civils','darkchat'];
const POLICE_PARENT_TAGS = ['BCSO','LSPD'];
const POLICE_SUB_TAGS = ['DEA','USM','SWAT','SRAU','SU'];
const GROUP_CATEGORIES = [
  {id:'police',label:'Police',requiredTags:['BCSO','LSPD']},
  {id:'gangs',label:'Gangs',requiredTags:['Gang']},
  {id:'entreprises',label:'Entreprises',requiredTags:['Entreprise']},
];
const BASE_TAG_COLORS = {BCSO:'#3B82F6',LSPD:'#6366F1',Gang:'#EF4444',Entreprise:'#F59E0B',Civils:'#10B981',darkchat:'#14B8A6'};
const GROUP_TAG_COLOR = '#C9A96E';
const ARCHIVED_GROUP_TAG_COLOR = '#6B7280';

const ROLE_PERMISSIONS = {
  'Admin':{read:true,create:true,edit:true,delete:true,announce:true,manage:true},
  'Patron':{read:true,create:true,edit:true,delete:true,announce:true,manage:true},
  'Co patron':{read:true,create:true,edit:true,delete:true,announce:true,manage:true},
  'Bras droit':{read:true,create:true,edit:true,delete:true,announce:false,manage:false},
  'Lieutenant':{read:true,create:true,edit:false,delete:false,announce:false,manage:false},
  'Élite':{read:true,create:true,edit:false,delete:false,announce:false,manage:false},
  'Elite':{read:true,create:true,edit:false,delete:false,announce:false,manage:false},
  'Soldat':{read:true,create:true,edit:false,delete:false,announce:false,manage:false},
  'En attente':{read:false,create:false,edit:false,delete:false,announce:false,manage:false},
};

const DEFAULT_PERMISSIONS = {read:false,create:false,edit:false,delete:false,announce:false,manage:false};

function normalizeRole(role){
  return String(role || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/-/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

function getPermissionsForRole(role){
  const exactMatch = ROLE_PERMISSIONS[role];
  if(exactMatch) return exactMatch;
  const normalized = normalizeRole(role);
  const byNormalized = Object.keys(ROLE_PERMISSIONS).find(r => normalizeRole(r) === normalized);
  return byNormalized ? ROLE_PERMISSIONS[byNormalized] : DEFAULT_PERMISSIONS;
}

function can(action){
  return Boolean(currentUser && getPermissionsForRole(currentUser.role)[action]);
}

function applyAccessModeUI(){
  const desktopNav = document.querySelector('nav .hidden.md\\:flex.items-center.gap-1');
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  if(profileOnlyMode){
    if(desktopNav) desktopNav.classList.add('hidden');
    if(mobileMenuBtn) mobileMenuBtn.classList.add('hidden');
    if(mobileMenu) mobileMenu.classList.add('hidden');
    return;
  }

  if(desktopNav) desktopNav.classList.remove('hidden');
  if(mobileMenuBtn) mobileMenuBtn.classList.remove('hidden');
}

function cleanUrl(){
  if(window.location.hash){
    const cleanPath = window.location.pathname + window.location.search;
    history.replaceState(null, '', cleanPath);
  }
}

function normalizeTextValue(value){
  return String(value || '').replace(/\s+/g, ' ').trim();
}

function normalizeProfileName(value){
  return normalizeTextValue(value);
}

function normalizeGroupName(value){
  return normalizeTextValue(value);
}

function parseTags(value){
  return [...new Set(String(value || '').split(',').map(tag=>tag.trim()).filter(Boolean))];
}

function stringifyTags(tags){
  return [...new Set((tags || []).map(tag=>String(tag || '').trim()).filter(Boolean))].join(',');
}

function isBaseTag(tag){
  return BASE_TAGS.includes(tag);
}

function isPoliceSubTag(tag){
  return POLICE_SUB_TAGS.includes(tag);
}

function shouldEnablePoliceSubTags(tags){
  const selected = (tags || []).map(tag => String(tag || '').trim());
  return POLICE_PARENT_TAGS.some(tag => selected.includes(tag));
}

function normalizeGroupCategory(value){
  const normalized = String(value || '').trim().toLowerCase();
  return GROUP_CATEGORIES.some(category => category.id === normalized) ? normalized : '';
}

function getGroupCategory(categoryId){
  const normalized = normalizeGroupCategory(categoryId);
  return GROUP_CATEGORIES.find(category => category.id === normalized) || null;
}

function getGroupCategoryLabel(categoryId){
  return getGroupCategory(categoryId)?.label || 'Non classe';
}

function groupMatchesSelectedTags(group, selectedTags){
  const category = getGroupCategory(group?.category);
  if(!category){
    const selected = new Set((selectedTags || []).map(tag => String(tag || '').trim()));
    return ['BCSO','LSPD','Gang','Entreprise'].some(tag => selected.has(tag));
  }
  const selected = new Set((selectedTags || []).map(tag => String(tag || '').trim()));
  return category.requiredTags.some(tag => selected.has(tag));
}

function getAvailableGroupsForTags(selectedTags){
  return getActiveGroups().filter(group => groupMatchesSelectedTags(group, selectedTags));
}

function getTagColor(tag){
  if(BASE_TAG_COLORS[tag]) return BASE_TAG_COLORS[tag];
  if(/^ex-/i.test(String(tag || ''))) return ARCHIVED_GROUP_TAG_COLOR;
  return GROUP_TAG_COLOR;
}

function getGroupById(groupId){
  return allGroups.find(group => group.id === groupId) || null;
}

function getActiveGroups(){
  return allGroups.filter(group => group.status !== 'archived');
}

function getArchivedGroups(){
  return allGroups.filter(group => group.status === 'archived');
}

function getRecordsForGroup(groupId){
  return allRecords.filter(record => !record.is_announcement && record.group_id === groupId);
}

function validateGroupName(name, currentGroupId = null){
  const normalized = normalizeGroupName(name);
  if(!normalized) return 'Le nom du groupe est requis';
  if(normalized.includes(',')) return 'Le nom du groupe ne peut pas contenir de virgule';
  if(/^ex-/i.test(normalized)) return 'Le nom du groupe ne peut pas commencer par ex-';
  const duplicate = getActiveGroups().find(group => group.id !== currentGroupId && normalizeGroupName(group.name).toLowerCase() === normalized.toLowerCase());
  return duplicate ? 'Un groupe avec ce nom existe déjà' : '';
}

function withoutTag(tags, tag){
  const target = String(tag || '').toLowerCase();
  return parseTags(tags).filter(existing => existing.toLowerCase() !== target);
}

function stripGroupAliases(tags, ...groupNames){
  let nextTags = parseTags(tags);
  groupNames.filter(Boolean).forEach(groupName => {
    nextTags = withoutTag(nextTags, groupName);
    nextTags = withoutTag(nextTags, `ex-${groupName}`);
  });
  return nextTags;
}

function buildRecordTags(baseTags, groupId, subTags = []){
  const nextTags = (baseTags || []).filter(isBaseTag);
  if(shouldEnablePoliceSubTags(nextTags)){
    nextTags.push(...(subTags || []).filter(isPoliceSubTag));
  }
  const group = groupId ? getGroupById(groupId) : null;
  if(group && group.status !== 'archived') nextTags.push(group.name);
  return stringifyTags(nextTags);
}

function getGroupTagLabel(group){
  if(!group) return '';
  return group.status === 'archived' ? (group.archived_tag || `ex-${group.name}`) : group.name;
}

async function loadDashboardData(){
  const [recordsResponse, groupsResponse] = await Promise.all([
    sb.from('records').select('*').order('created_at',{ascending:true}),
    sb.from('record_groups').select('*').order('name',{ascending:true})
  ]);
  if(recordsResponse.error || groupsResponse.error){
    showToast(recordsResponse.error?.message || groupsResponse.error?.message || 'Erreur de chargement des données','error');
    return;
  }
  allRecords = recordsResponse.data || [];
  allGroups = groupsResponse.data || [];
  renderCurrentPage();
}

async function initDashboard(profile, session){
  const meta = session?.user?.user_metadata || {};
  const avatarUrl = meta.avatar_url || '';
  const discordName = meta.full_name || meta.custom_claims?.global_name || meta.name || profile.username;

  currentUser = {
    id: profile.id,
    name: profile.username,
    role: profile.role || 'En attente',
    username: profile.username,
    avatar_url: avatarUrl,
    discord_name: discordName,
  };

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('flex');

  const navUserEl = document.getElementById('navUser');
  navUserEl.textContent = currentUser.discord_name || currentUser.name;
  const navAvatarEl = document.getElementById('navAvatar');
  if(navAvatarEl && avatarUrl){
    navAvatarEl.src = avatarUrl;
    navAvatarEl.classList.remove('hidden');
    const navAvatarIcon = document.getElementById('navAvatarIcon');
    if(navAvatarIcon) navAvatarIcon.classList.add('hidden');
  }

  profileOnlyMode = !can('read');
  applyAccessModeUI();

  if(can('read')){
    await loadDashboardData();
    navigate('accueil');
  } else {
    allRecords = [];
    allGroups = [];
    navigate('profil');
  }
  lucide.createIcons();
}

function showAuthError(message){
  const loading = document.getElementById('loading');
  const mainApp = document.getElementById('mainApp');
  if(mainApp){
    mainApp.classList.add('hidden');
    mainApp.classList.remove('flex');
  }
  if(loading){
    loading.classList.remove('hidden');
    loading.innerHTML = `
      <div class="text-center fade-up px-6 max-w-md">
        <img src="https://i.postimg.cc/SxPXrddz/aguerta18.png" alt="Aguerta 18" class="w-16 h-16 mx-auto mb-4 object-contain opacity-80">
        <p class="text-red-300 text-sm mb-4">${message}</p>
        <div class="flex items-center justify-center gap-2">
          <button onclick="location.reload()" class="px-4 py-2 text-xs rounded border border-border text-cream/80 hover:text-bone hover:border-gold/40">Reessayer</button>
          <button onclick="window.location.href='index.html'" class="px-4 py-2 text-xs rounded bg-gold text-black hover:bg-darkgold">Retour connexion</button>
        </div>
      </div>
    `;
  }
}

async function bootstrapAuth(){
  try {
    const {data: {session}, error: sessionError} = await sb.auth.getSession();
    if(sessionError) throw sessionError;

    cleanUrl();

    if(!session){
      window.location.href = 'index.html';
      return;
    }

    let profile = null;
    const {data: existingProfile, error: profileError} = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    if(profileError) throw profileError;
    profile = existingProfile;

    if(!profile && session.user){
      const meta = session.user.user_metadata || {};
      const username = meta.full_name || meta.name || meta.preferred_username || 'Utilisateur';
      const {data: newProfile, error: insertErr} = await sb.from('profiles').insert({
        id: session.user.id,
        username: username,
        role: 'En attente'
      }).select().single();
      if(insertErr) throw insertErr;
      profile = newProfile;
    }

    if(profile){
      await initDashboard(profile, session);
      return;
    }

    throw new Error('Profil introuvable après authentification');
  } catch (error) {
    console.error('Erreur bootstrapAuth:', error);
    showAuthError('Impossible de charger votre session. Vérifie les clés Supabase et la redirection OAuth.');
  }
}

bootstrapAuth();

sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'SIGNED_OUT'){
    window.location.href = 'index.html';
  }
});

function navigate(page){
  if(profileOnlyMode && page !== 'profil'){
    currentPage = 'profil';
    renderCurrentPage();
    return;
  }
  currentPage = page;
  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.classList.toggle('active', b.dataset.nav === page);
    b.classList.toggle('text-bone', b.dataset.nav === page);
  });
  renderCurrentPage();
}

    (f.telephone||'').includes(q)||
    (f.description||'').toLowerCase().includes(q)||
    (f.tags||'').toLowerCase().includes(q)||
    (f.title||'').toLowerCase().includes(q)
  );

function getFicheMedia(record){
  if(!record || record.is_announcement) return {};
  try {
    const parsed = JSON.parse(record.content || '{}');
    if(parsed && parsed._kind === 'fiche_media') return parsed;
  } catch (_) {}
  return {};
}

function getMediaValue(media, key){
  if(!media) return '';
  return media[`${key}_data`] || media[`${key}_url`] || '';
}

function setMediaInputValue(key, value){
  const hidden = document.getElementById(`ff-media-${key}`);
  const preview = document.getElementById(`ff-media-preview-${key}`);
  if(!hidden || !preview) return;
  hidden.value = value || '';
  preview.innerHTML = value
    ? `<img src="${esc(value)}" alt="${esc(key)}" class="media-preview-img">`
    : '<span class="text-[11px] text-cream/30">Aucune image enregistrée</span>';
}

function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleMediaFileChange(event, key){
  const file = event?.target?.files?.[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){showToast('Le fichier doit être une image','error');return}
  if(file.size > MEDIA_MAX_SIZE_BYTES){showToast(`Image trop lourde (max ${MEDIA_MAX_SIZE_MB}MB)`,'error');return}
  const dataUrl = await fileToDataUrl(file);
  setMediaInputValue(key, dataUrl);
}

function clearMediaInput(key){
  const picker = document.getElementById(`ff-media-file-${key}`);
  if(picker) picker.value = '';
  setMediaInputValue(key, '');
}

let hoveredMediaInputKey = null;
function setHoveredMediaInputKey(key){
  hoveredMediaInputKey = String(key || '').trim() || null;
}

function clearHoveredMediaInputKey(key){
  if(hoveredMediaInputKey === key) hoveredMediaInputKey = null;
}

async function handleHoveredMediaPaste(event){
  if(currentPage !== 'fiche-new' || !hoveredMediaInputKey) return;
  const items = [...(event?.clipboardData?.items || [])];
  const imageItem = items.find(item => item.kind === 'file' && String(item.type || '').startsWith('image/'));
  if(!imageItem) return;
  const file = imageItem.getAsFile();
  if(!file) return;
  if(file.size > MEDIA_MAX_SIZE_BYTES){
    showToast(`Image trop lourde (max ${MEDIA_MAX_SIZE_MB}MB)`,'error');
    return;
  }
  event.preventDefault();
  const dataUrl = await fileToDataUrl(file);
  setMediaInputValue(hoveredMediaInputKey, dataUrl);
  showToast('Image collee dans la fiche');
}

window.addEventListener('paste', event => {
  handleHoveredMediaPaste(event).catch(() => {
    showToast('Impossible de coller cette image','error');
  });
});

function renderCurrentPage(){

  switch(currentPage){
    case'accueil':renderAccueil(c,fiches,annonces);break;
    case'police':renderCategory(c,'Police',applySearch(fiches.filter(f=>(f.tags||'').includes('BCSO')||(f.tags||'').includes('LSPD'))));break;
    case'gang':renderCategory(c,'Gang',applySearch(fiches.filter(f=>(f.tags||'').includes('Gang'))));break;
    case'entreprise':renderCategory(c,'Entreprise',applySearch(fiches.filter(f=>(f.tags||'').includes('Entreprise'))));break;

    case'groupes':renderGroupsPage(c);break;

function setTagButtonState(btn, selected){
  btn.dataset.selected = selected ? 'true' : 'false';
  if(selected){
    btn.className = 'tag-pill text-xs px-3 py-1 rounded-full border transition-all border-gold/50 text-gold bg-gold/10';
    return;
  }
  btn.className = 'tag-pill text-xs px-3 py-1 rounded-full border transition-all border-border text-cream/40 hover:border-cream/30';
}

function getSelectedTagValues(selector){
  const elements = [...document.querySelectorAll(`${selector} [data-selected="true"]`)];
  return elements.map(button => button.dataset.tag).filter(Boolean);
}

function updatePoliceSubTagVisibility(){
  const wrap = document.getElementById('policeSubTagWrap');
  if(!wrap) return;
  const show = shouldEnablePoliceSubTags(getSelectedTagValues('#tagSelector'));
  wrap.classList.toggle('hidden', !show);
  if(show) return;
  document.querySelectorAll('#policeSubTagSelector [data-selected="true"]').forEach(button => setTagButtonState(button, false));
}

function updateGroupTagSelector(){
  const container = document.getElementById('groupTagSelector');
  const hidden = document.getElementById('ff-group-id');
  if(!container || !hidden) return;
  const selectedBaseTags = getSelectedTagValues('#tagSelector');
  const availableGroups = getAvailableGroupsForTags(selectedBaseTags);
  const selectedGroup = ficheFormSelectedGroupId ? getGroupById(ficheFormSelectedGroupId) : null;
  if(selectedGroup && normalizeGroupCategory(selectedGroup.category) && !availableGroups.some(group => group.id === selectedGroup.id)){
    ficheFormSelectedGroupId = null;
  }
  const groupsToRender = [...availableGroups];
  if(selectedGroup && !normalizeGroupCategory(selectedGroup.category) && !groupsToRender.some(group => group.id === selectedGroup.id)){
    groupsToRender.unshift(selectedGroup);
  }

  if(ficheFormSelectedGroupId && !groupsToRender.some(group => group.id === ficheFormSelectedGroupId)){
    ficheFormSelectedGroupId = null;
  }
  hidden.value = ficheFormSelectedGroupId || '';

  if(!groupsToRender.length){
    container.innerHTML = '<span class="text-[11px] text-cream/30">Coche un tag parent (Police, Gang ou Entreprise) pour afficher les tags de groupe.</span>';
    return;
  }

  container.innerHTML = groupsToRender.map(group => {
    const selected = group.id === ficheFormSelectedGroupId;
    return `<button type="button" onclick="toggleGroupTag('${group.id}')" class="tag-pill text-xs px-3 py-1 rounded-full border transition-all ${selected?'border-gold/50 text-gold bg-gold/10':'border-border text-cream/40 hover:border-cream/30'}">${esc(group.name)}</button>`;
  }).join('');
}

function toggleGroupTag(groupId){
  ficheFormSelectedGroupId = ficheFormSelectedGroupId === groupId ? null : groupId;
  updateGroupTagSelector();
}

function toggleTag(btn,tag){
  const sel = btn.dataset.selected==='true';
  setTagButtonState(btn, !sel);
  updatePoliceSubTagVisibility();
  updateGroupTagSelector();
}

function toggleSubTag(btn,tag){
  const sel = btn.dataset.selected==='true';
  setTagButtonState(btn, !sel);
}

async function handleFicheSubmit(e){
  e.preventDefault();
  const btn = document.getElementById('ficheSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="animate-pulse">Enregistrement...</span>';
  const fd = new FormData(e.target);
  const groupId = String(fd.get('group_id') || '').trim() || null;
  if(groupId && !getGroupById(groupId)){
    showToast('Le groupe sélectionné est introuvable','error');
    btn.disabled = false; btn.innerHTML = 'Réessayer';
    return;
  }
  const selectedTags = getSelectedTagValues('#tagSelector');
  const selectedSubTags = getSelectedTagValues('#policeSubTagSelector');
  const tags = buildRecordTags(selectedTags, groupId, selectedSubTags);
  const ficheMedia = {
    _kind: 'fiche_media',
    id_card_data: String(fd.get('id_card_data')||'').trim(),
    driver_license_data: String(fd.get('driver_license_data')||'').trim(),
    ppa_data: String(fd.get('ppa_data')||'').trim(),
    person_photo_data: String(fd.get('person_photo_data')||'').trim(),
  };
  const ficheContent = JSON.stringify(ficheMedia);

  if(editingFicheId){
    const {error} = await sb.from('records').update({
      nom: fd.get('nom'), prenom: fd.get('prenom'),
      telephone: fd.get('telephone'), description: fd.get('description'), tags, group_id: groupId,
      content: ficheContent,
    }).eq('id', editingFicheId);
    if(error){showToast('Erreur de modification','error');btn.disabled=false;btn.innerHTML='Réessayer';return}
    showToast('Fiche modifiée');
  } else {
    const {error} = await sb.from('records').insert({
      type: 'fiche', nom: fd.get('nom'), prenom: fd.get('prenom'),
      telephone: fd.get('telephone'), description: fd.get('description'),
      tags, group_id: groupId, is_announcement: false,
      content: ficheContent,
      created_by: currentUser?.name || 'Inconnu'
    });
    if(error){showToast('Erreur de création','error');btn.disabled=false;btn.innerHTML='Réessayer';return}
    showToast('Fiche créée');
  }
  editingFicheId = null;
  await loadDashboardData();
  navigate('accueil');
}

async function handleGroupCreate(e){
  e.preventDefault();
  const btn = document.getElementById('groupCreateBtn');
  const fd = new FormData(e.target);
  const groupName = normalizeGroupName(fd.get('group_name'));
  const groupCategory = normalizeGroupCategory(fd.get('group_category'));
  const validationError = validateGroupName(groupName);
  if(validationError){showToast(validationError,'error');return}
  if(!groupCategory){showToast('Choisis une categorie de groupe','error');return}
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-pulse">Création...</span>';
  const {error} = await sb.from('record_groups').insert({
    name: groupName,
    category: groupCategory,
    status: 'active',
    archived_tag: `ex-${groupName}`,
    updated_at: new Date().toISOString()
  });
  if(error){showToast(error.message || 'Erreur de création du groupe','error');btn.disabled=false;btn.innerHTML='Créer le groupe';return}
  e.target.reset();
  showToast(`Groupe ${groupName} créé`);
  await loadDashboardData();
  selectedGroupId = allGroups.find(group => normalizeGroupName(group.name).toLowerCase() === groupName.toLowerCase())?.id || null;
  renderCurrentPage();
}

async function renameGroup(groupId){
  const group = getGroupById(groupId);
  if(!group) return;
  const nextName = normalizeGroupName(window.prompt('Nouveau nom du groupe', group.name) || '');
  if(!nextName || nextName === group.name) return;
  const validationError = validateGroupName(nextName, groupId);
  if(validationError){showToast(validationError,'error');return}
  try {
    const records = getRecordsForGroup(groupId);
    for(const record of records){
      const nextTags = stripGroupAliases(record.tags, group.name, nextName);
      nextTags.push(nextName);
      const {error: recordError} = await sb.from('records').update({tags: stringifyTags(nextTags)}).eq('id', record.id);
      if(recordError) throw recordError;
    }
    const {error} = await sb.from('record_groups').update({name: nextName, archived_tag: `ex-${nextName}`, updated_at: new Date().toISOString()}).eq('id', groupId);
    if(error) throw error;
    showToast('Groupe renommé');
    await loadDashboardData();
  } catch (error) {
    showToast(error.message || 'Erreur de renommage','error');
  }
}

async function deleteGroup(groupId){
  const group = getGroupById(groupId);
  if(!group) return;
  if(!window.confirm(`Supprimer le groupe ${group.name} ? Les fiches garderont le tag ex-${group.name}.`)) return;
  try {
    const archivedTag = `ex-${group.name}`;
    const records = getRecordsForGroup(groupId);
    for(const record of records){
      const nextTags = stripGroupAliases(record.tags, group.name);
      nextTags.push(archivedTag);
      const {error: recordError} = await sb.from('records').update({tags: stringifyTags(nextTags), group_id: null}).eq('id', record.id);
      if(recordError) throw recordError;
    }
    const {error} = await sb.from('record_groups').update({status:'archived', archived_tag: archivedTag, updated_at: new Date().toISOString()}).eq('id', groupId);
    if(error) throw error;
    showToast('Groupe supprimé');
    selectedGroupId = null;
    await loadDashboardData();
    navigate('groupes');
  } catch (error) {
    showToast(error.message || 'Erreur de suppression du groupe','error');
  }
}

async function doDeleteAnnonce(id){
  const {error} = await sb.from('records').delete().eq('id', id);
  if(error){showToast('Erreur de suppression','error');return}
  showToast('Annonce supprimée');
  await loadDashboardData();
}

function showAnnounceForm(){
  const area = document.getElementById('announceFormArea');
  if(!area) return;
  area.innerHTML=`
  <form onsubmit="handleAnnounceSubmit(event)" class="bg-panel border border-border rounded-lg p-5 mb-6 fade-up space-y-3">
    <div><label for="ann-title" class="text-[10px] text-cream/40 uppercase tracking-wider mb-1 block">Titre *</label><input id="ann-title" name="title" required class="w-full px-3 py-2 rounded text-sm"></div>
    <div><label for="ann-content" class="text-[10px] text-cream/40 uppercase tracking-wider mb-1 block">Contenu *</label><textarea id="ann-content" name="content" required rows="3" class="w-full px-3 py-2 rounded text-sm resize-none"></textarea></div>
    <div class="flex gap-2">
      <button type="submit" id="annSubmit" class="px-4 py-2 bg-gold/10 border border-gold/40 text-gold text-xs rounded hover:bg-gold/20 transition-all">Publier</button>
      <button type="button" onclick="this.closest('form').remove()" class="px-4 py-2 bg-surface border border-border text-cream/40 text-xs rounded">Annuler</button>
    </div>
  </form>`;
  lucide.createIcons();
}

async function handleAnnounceSubmit(e){
  e.preventDefault();
  const btn = document.getElementById('annSubmit');
  btn.disabled = true; btn.textContent = 'Publication...';
  const fd = new FormData(e.target);

  const {error} = await sb.from('records').insert({
    type: 'announcement', title: fd.get('title'), content: fd.get('content'),
    is_announcement: true, created_by: currentUser?.name || 'Inconnu',
    nom: '', prenom: '', telephone: '', description: '', tags: '', group_id: null
  });
  if(error){showToast('Erreur de publication','error');btn.disabled=false;btn.textContent='Publier';return}
  showToast('Annonce publiée');
  await loadDashboardData();
  navigate('annonces');
}

async function loadUsersForAdmin(){
  const area = document.getElementById('adminUsersArea');
  if(!area) return;
  area.innerHTML = 'Chargement...';

  const {data: users, error} = await sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error){area.innerHTML=`<p class="text-red-400">${esc(error.message||'Erreur')}</p>`;return}
  if(!users||!users.length){area.innerHTML='<p>Aucun utilisateur</p>';return}

  area.innerHTML = users.map(u=>`<div class="bg-surface border border-border rounded p-3 flex flex-col gap-3">
    <div class="grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_auto_auto] gap-2 items-end">
      <div>
        <label for="username-${u.id}" class="text-[10px] text-cream/30 uppercase tracking-wider mb-1 block">Nom interne</label>
        <input id="username-${u.id}" value="${esc(u.username||'')}" class="w-full px-2 py-1 rounded text-xs">
      </div>
      <div>
        <label for="role-${u.id}" class="text-[10px] text-cream/30 uppercase tracking-wider mb-1 block">Rôle</label>
        <select id="role-${u.id}" class="px-2 py-1 rounded text-xs">
        ${ROLES_HIERARCHY.map(role=>`<option value="${esc(role)}" ${u.role===role?'selected':''}>${esc(role)}</option>`).join('')}
      </select>
      </div>
      <button onclick="saveUserSettings('${u.id}')" class="px-3 py-1.5 bg-gold/10 border border-gold/30 text-gold rounded text-xs">Enregistrer</button>
    </div>
    <p class="text-[11px] text-cream/35">Discord conserve le nom du compte, mais l’admin peut modifier le pseudo interne affiché dans l’outil.</p>
  </div>`).join('');
}

async function saveUserSettings(userId){
  const input = document.getElementById(`role-${userId}`);
  const usernameInput = document.getElementById(`username-${userId}`);
  if(!input || !usernameInput) return;
  const role = input.value;
  const username = normalizeProfileName(usernameInput.value);
  if(!username){showToast('Le nom utilisateur ne peut pas être vide','error');return}

  const {error} = await sb.from('profiles').update({role, username}).eq('id', userId);
  if(error){showToast(error.message||'Erreur de mise à jour','error');return}
  showToast('Utilisateur mis à jour');

  if(userId === currentUser.id){
    currentUser.role = role;
    currentUser.username = username;
    currentUser.name = username;
    document.getElementById('navUser').textContent = currentUser.discord_name || currentUser.name;
  }
  if(currentPage === 'profil') renderCurrentPage();
  await loadUsersForAdmin();
}

async function logout(){
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function formatDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}catch{return''}}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`fixed bottom-4 right-4 z-50 px-4 py-3 rounded border text-sm toast ${type==='error'?'bg-red-500/10 border-red-500/30 text-red-400':'bg-gold/10 border-gold/30 text-gold'}`;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3000);
}

// ===== LIGHTBOX =====
let _lbGallery = [];
let _lbIdx = 0;

function lbOpen(gallery, idx){
  _lbGallery = gallery;
  _lbIdx = idx;
  _lbRender();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', _lbKey);
}

function lbClose(){
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', _lbKey);
}

function lbNav(dir){
  _lbIdx = (_lbIdx + dir + _lbGallery.length) % _lbGallery.length;
  _lbRender();
}

function lbBgClick(e){
  if(e.target === document.getElementById('lightbox')) lbClose();
}

function _lbKey(e){
  if(e.key==='Escape') lbClose();
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
}

function _lbRender(){
  const item = _lbGallery[_lbIdx];
  const img = document.getElementById('lbImg');
  img.classList.remove('lb-img-anim');
  void img.offsetWidth; // reflow to restart animation
  img.classList.add('lb-img-anim');
  img.src = item.src;
  img.alt = item.label;
  document.getElementById('lbLabel').textContent = item.label;
  document.getElementById('lbCounter').textContent = `${_lbIdx+1} / ${_lbGallery.length}`;

  // Nav buttons
  const prev = document.getElementById('lbPrev');
  const next = document.getElementById('lbNext');
  if(_lbGallery.length <= 1){
    prev.disabled = true;
    next.disabled = true;
  } else {
    prev.disabled = false;
    next.disabled = false;
  }

  // Dots
  const dots = document.getElementById('lbDots');
  dots.innerHTML = _lbGallery.map((_,i)=>`<div class="lb-dot${i===_lbIdx?' active':''}"></div>`).join('');
}
