<body class="h-full bg-black text-bone font-['Outfit',sans-serif]">

      <img src="https://i.postimg.cc/SxPXrddz/aguerta18.png" alt="Aguerta 18" class="w-28 h-28 mx-auto mb-6 object-contain">
      <h1 class="text-4xl font-['Cormorant_Garamond'] font-bold text-bone mb-2">Aguerta 18</h1>
      <p class="text-cream/50 text-sm mb-3 tracking-widest uppercase">Base de données privée</p>
      <p class="text-cream/40 text-xs mb-8">Accès restreint — Connexion via Discord</p>
      <div class="w-full max-w-xs mx-auto">
        <button onclick="loginWithDiscord()" id="discordLoginBtn" class="w-full px-8 py-3.5 bg-[#5865F2] text-white rounded-lg hover:bg-[#4752C4] transition-all flex items-center justify-center gap-3 text-sm font-medium shadow-lg shadow-[#5865F2]/20">

          Se connecter avec Discord
        </button>
        <p class="text-cream/30 text-[10px] mt-4">Ton compte Discord sera utilisé pour accéder à la base de données.</p>
        <p id="loginError" class="text-red-400 text-xs mt-3 hidden"></p>
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = 'https://lcwtiaohaedeuelzbvfk.supabase.co';
const SUPABASE_ANON_KEY = 'lcwtiaohaedeuelzbvfk'; // ← Remplace par ta clé anon (Settings > API)
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Si déjà connecté → rediriger vers le dashboard
(async function(){
  const {data: {session}} = await sb.auth.getSession();
  if(session) window.location.href = 'dashboard.html';
})();

async function loginWithDiscord(){
  const btn = document.getElementById('discordLoginBtn');
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-pulse">Redirection vers Discord...</span>';

  // Construire l'URL de redirection robuste
  const basePath = window.location.pathname.replace('index.html', '').replace(/\/$/, '') || '/';
  const redirectUrl = new URL(window.location.origin + basePath + '/dashboard.html').href;

  const {error} = await sb.auth.signInWithOAuth({
    provider: 'discord',
    options: {
      scopes: 'identify email guilds guilds.members.read',
      redirectTo: redirectUrl
    }
  });

  if(error){
    errEl.textContent = error.message || 'Erreur de connexion Discord';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg> Se connecter avec Discord`;
  }
}
</script>
